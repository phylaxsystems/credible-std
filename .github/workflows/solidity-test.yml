name: Solidity Test CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  solidity-base:
    uses: phylaxsystems/actions/.github/workflows/solidity-base.yaml@main
    with:
      gas-diff-tolerance: 25
      # Protection-suite tests exercise the Phorge-only `cl.assertion` cheatcode, so the whole
      # suite runs under `pcl test` in the protection-pcl job instead of base `forge test`.
      forge-test-args: "--no-match-path 'test/{backtesting,protection}/**'"
      disable-gas-snapshot: true

  protection-pcl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install PCL
        run: |
          curl -sSL https://github.com/phylaxsystems/pcl/releases/download/1.5.1/pcl-1.5.1-linux-x86_64.tar.gz | tar -xz
          sudo install pcl/pcl /usr/local/bin/pcl

      - name: Run protection PCL tests
        run: FOUNDRY_PROFILE=ci pcl test --match-path 'test/protection/**'

  # Example assertion suites live under their own foundry profiles (examples/<name>) and also use the
  # Phorge-only `cl.assertion` cheatcode, so they run under `pcl test` here. Add a profile to the
  # matrix when its example is ready to be gated on every PR.
  # `safe-guard` is a plain-forge integration suite (real Gnosis Safe + CredibleSafeGuard) on its own
  # profile because the Safe contracts need the legacy pipeline; pcl runs plain forge tests too.
  examples-pcl:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [fluid, lido, mellow, safe-guard]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install PCL
        run: |
          curl -sSL https://github.com/phylaxsystems/pcl/releases/download/1.5.1/pcl-1.5.1-linux-x86_64.tar.gz | tar -xz
          sudo install pcl/pcl /usr/local/bin/pcl

      - name: Run ${{ matrix.profile }} example PCL tests
        run: FOUNDRY_PROFILE=${{ matrix.profile }} pcl test
