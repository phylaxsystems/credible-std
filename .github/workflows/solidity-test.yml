name: Solidity Test CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  solidity-base:
    uses: phylaxsystems/actions/.github/workflows/solidity-base.yaml@main
    with:
      gas-diff-tolerance: 25
      forge-test-args: "--no-match-path 'test/backtesting/**'"
      disable-gas-snapshot: true

  example-profile-builds:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - assertions-book
          - vault-demo
          - micro-patterns
          - aave
          - aerodrome
          - cap
          - curve
          - denaria
          - euler
          - nado
          - royco
          - safe
          - spark
          - symbiotic
          - tydro
          - uniswap
          - veda
          - zeroex
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build example profile
        run: FOUNDRY_PROFILE=${{ matrix.profile }} forge build
